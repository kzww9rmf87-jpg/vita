services:

  # ─── Base de données ──────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: vita-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vita
      POSTGRES_USER: vita
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vita"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vita-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auth Service ─────────────────────────────────────
  auth-service:
    build:
      context: ../../backend/auth-service
      dockerfile: Dockerfile
    container_name: vita-auth
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vita:${POSTGRES_PASSWORD}@postgres:5432/vita
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  # ─── Data Service ─────────────────────────────────────
  data-service:
    build:
      context: ../../backend/data-service
      dockerfile: Dockerfile
    container_name: vita-data
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vita:${POSTGRES_PASSWORD}@postgres:5432/vita
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PORT: 3002
      AI_ENGINE_URL: http://ai-engine:3003
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3002:3002"

  # ─── Moteur IA ────────────────────────────────────────
  ai-engine:
    build:
      context: ../../ai-engine
      dockerfile: Dockerfile
    container_name: vita-ai
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vita:${POSTGRES_PASSWORD}@postgres:5432/vita
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Proxy inverse (développement) ───────────────────
  nginx:
    image: nginx:alpine
    container_name: vita-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - data-service
      - ai-engine

volumes:
  postgres_data:
  redis_data:
