events { worker_connections 1024; }

http {
  upstream auth    { server auth-service:3001; }
  upstream data    { server data-service:3002; }
  upstream ai      { server ai-engine:3003; }

  server {
    listen 80;

    # Auth
    location /auth/ {
      proxy_pass http://auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Chat + recommandations (via data-service qui proxifie vers ai-engine)
    location /chat {
      proxy_pass http://data/chat;
      proxy_set_header Host $host;
    }

    # Toutes les autres API → data-service
    location / {
      proxy_pass http://data/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 30s;
    }
  }
}
