name: Vita
options:
  bundleIdPrefix: com.vita
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: "NO"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES

targets:
  Vita:
    type: application
    platform: iOS
    sources:
      - path: Vita
        excludes:
          - "**/.DS_Store"
    info:
      path: Vita/Info.plist
      properties:
        CFBundleName: VITA
        CFBundleDisplayName: VITA
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: Background
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "VITA synchronise tes données Apple Health pour personnaliser tes recommandations."
        NSHealthUpdateUsageDescription: "VITA synchronise tes données Apple Health pour personnaliser tes recommandations."
        AUTH_BASE_URL: "http://127.0.0.1:3001"
        DATA_BASE_URL: "http://127.0.0.1:3002"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
    entitlements:
      path: Vita/Vita.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vita.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vita/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: Accent
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies: []

schemes:
  Vita:
    build:
      targets:
        Vita: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
